<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zeroquery Text Chat Viewer (Ultimate Parsing)</title>
  <style>
    /* =========================================
       디자인 시스템 스타일 & 반응형 & 보기기준 패치
       ========================================= */
    :root {
      --bg: #eef1f5; --panel: #ffffff; --ink: #15171a; --muted: #6f7782;
      --line: #d9dee7; --accent: #2f6fed; --accent-soft: #e9f0ff;
      --danger: #bf3d3d; --good: #23835f; --chat-bg: #b8d2ec;
      --kakao: #fee500; --shadow-soft: 0 1px 2px rgba(20, 26, 36, .04);
    }
    * { box-sizing: border-box; }
    [hidden] { display: none !important; }
    
    body {
      margin: 0; min-width: 0; overflow: hidden; background: var(--bg); color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    }
    button, input, select, textarea { font: inherit; }
    
    .workspace {
      height: 100svh; display: grid; grid-template-rows: auto 1fr; gap: 12px;
      padding: 16px; font-size: 14px; line-height: 1.4;
    }
    .label-workspace { width: 100%; max-width: 1840px; margin-inline: auto; padding: clamp(14px, 1.2vw, 20px); }
    
    .topbar { display: flex; justify-content: space-between; align-items: end; gap: 16px; }
    .topbar h1 { margin: 0; font-size: 22px; letter-spacing: 0; }
    .topbar p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
    .app-header { display: grid; grid-template-columns: minmax(160px, 1fr) minmax(0, auto); align-items: start; column-gap: 16px; min-height: 46px; padding-bottom: 2px; }
    .app-title-block { min-width: 0; }
    
    .label-grid { min-height: 0; display: grid; grid-template-columns: minmax(560px, 1fr) clamp(520px, 38vw, 640px); grid-template-areas: "chat label"; gap: 16px; align-items: stretch; }
    
    .chat-panel { grid-area: chat; min-height: 0; display: grid; grid-template-rows: auto 1fr; border: 1px solid #9eb9d4; border-radius: 8px; overflow: hidden; background: var(--chat-bg); }
    .chat-header { min-height: 56px; display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 12px 16px; background: rgba(255, 255, 255, .45); border-bottom: 1px solid rgba(0, 0, 0, .08); }
    .chat-header > div:first-child { flex: 1 1 auto; min-width: 0; }
    .eyebrow { display: block; color: #546475; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .chat-header h2 { margin: 2px 0 0; font-size: 17px; line-height: 1.25; max-width: 100%; }
    .chat-header-tools { display: flex; align-items: center; gap: 10px; flex: 0 0 auto; }
    .chat-nav-pair { display: inline-flex; align-items: center; gap: 6px; }
    .nav-button { width: 34px; height: 34px; flex: 0 0 auto; border: 1px solid var(--line); border-radius: 6px; background: var(--panel); color: #424852; font-size: 26px; line-height: 1; cursor: pointer; }
    
    .viewer-control { display: grid; gap: 3px; color: #546475; font-size: 11px; font-weight: 800; }
    .viewer-control select { height: 34px; max-width: 150px; border: 1px solid var(--line); border-radius: 999px; padding: 0 26px 0 10px; background: rgba(255, 255, 255, .78); color: #28313d; font-size: 12px; cursor: pointer; }
    
    .conversation-index-control { display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--line); border-radius: 999px; min-height: 34px; padding: 3px 8px; background: rgba(255, 255, 255, .7); color: var(--muted); font-size: 12px; font-weight: 800; }
    .conversation-index-input { width: 34px; height: 24px; border: 0; border-radius: 6px; padding: 0 3px; background: transparent; color: #1f6fea; font: inherit; text-align: center; }
    .conversation-index-input:focus { outline: 2px solid rgba(31, 111, 234, .38); outline-offset: 0; background: rgba(255, 255, 255, .9); }
    .conversation-index-input:disabled { color: var(--muted); cursor: default; }
    .chat-body { min-height: 0; overflow-y: auto; padding: 16px; }
    .empty-state { height: 100%; display: flex; align-items: center; justify-content: center; color: #4b5968; font-size: 14px; }
    
    .message-row { display: flex; align-items: flex-start; gap: 8px; margin: 12px 0; }
    .message-row.me { justify-content: flex-end; }
    .speaker-avatar { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; flex: 0 0 auto; border-radius: 50%; border: 2px solid var(--avatar-ring); background: var(--avatar-bg); color: var(--avatar-ink); font-size: 12px; font-weight: 800; letter-spacing: 0; box-shadow: 0 1px 1px rgba(0, 0, 0, .12); }
    .message-stack { max-width: min(68%, 620px); }
    .speaker { margin-bottom: 4px; color: #334354; font-size: 12px; }
    .me-speaker { text-align: right; }
    .bubble { padding: 9px 11px; border-radius: 6px; background: #fff; box-shadow: 0 1px 1px rgba(0, 0, 0, .08); font-size: 14px; line-height: 1.45; white-space: pre-wrap; }
    .me .bubble { background: var(--kakao); }
    
    /* 시스템 메시지 가운데 정렬 */
    .message-row.system { justify-content: center; margin: 16px 0; }
    .message-row.system .bubble { background: rgba(200, 210, 225, 0.6); color: #4b5968; font-size: 12px; padding: 6px 14px; border-radius: 999px; box-shadow: none; font-weight: 700; text-align: center; }
    .message-row.system .speaker-avatar, .message-row.system .speaker { display: none; }

    .label-panel { grid-area: label; min-height: 0; height: 100%; display: grid; grid-template-rows: auto minmax(0, 1fr) auto; overflow: hidden; border: 1px solid var(--line); border-radius: 9px; background: #fff; box-shadow: var(--shadow-soft); }
    .label-panel-header { min-height: 0; display: grid; padding: 10px; border-bottom: 1px solid var(--line); background: #fbfcfe; }
    .label-panel-body { min-height: 0; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; overscroll-behavior: contain; padding: 10px; }
    .action-section { display: grid; grid-template-columns: 1fr; gap: 8px; border-top: 1px solid var(--line); background: #fff; padding: 10px; }
    .panel-section { min-width: 0; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); padding: 10px; box-shadow: var(--shadow-soft); display: flex; flex-direction: column; }
    .primary-workflow-section { flex: 1; border: 0; border-bottom: 1px solid #edf0f5; border-radius: 0; background: transparent; box-shadow: none; padding: 12px 10px; }
    .section-title { margin-bottom: 9px; color: var(--muted); font-size: 12px; font-weight: 800; }
    .admin-textarea { width: 100%; border: 1px solid var(--line); border-radius: 7px; background: #fff; padding: 10px 12px; color: var(--ink); font: inherit; }
    .primary-action { min-height: 38px; display: inline-flex; align-items: center; justify-content: center; border-radius: 7px; border: 1px solid var(--accent); background: var(--accent); color: #fff; font-weight: 800; cursor: pointer; text-decoration: none; width: 100%; }
    .primary-action:hover { opacity: 0.9; }

    @media (max-width: 1180px) {
      body { overflow: auto; }
      .workspace { height: auto; min-height: 100svh; overflow: visible; padding: 12px; }
      .label-grid { grid-template-columns: minmax(0, 1fr); grid-template-areas: "chat" "label"; gap: 12px; }
      .chat-panel { height: 65vh; min-height: 450px; }
      .label-panel { height: auto; min-height: 350px; overflow: visible; }
      .label-panel-body { overflow: visible; }
      .admin-textarea { min-height: 200px; }
    }

    @media (max-width: 768px) {
      .chat-header { min-height: auto; flex-direction: column; align-items: flex-start; gap: 8px; }
      .chat-header-tools { width: 100%; justify-content: space-between; flex-wrap: wrap; }
    }

    @media (max-width: 600px) {
      .topbar h1 { font-size: 18px; }
      .message-stack { max-width: 85%; }
    }
  </style>
</head>
<body>
  <main class="workspace label-workspace">
    <header class="topbar app-header">
      <div class="app-title-block">
        <h1>Zeroquery Text Chat Viewer</h1>
        <p>본문 속 ID(ego_...) 등장 및 포맷 혼용 케이스를 모두 안전하게 통과하는 최종 파서</p>
      </div>
    </header>

    <section class="label-grid">
      <article class="chat-panel">
        <div class="chat-header">
          <div>
            <span class="eyebrow">Conversation</span>
            <h2 id="conversationTopic">대화를 불러오세요</h2>
          </div>
          <div class="chat-header-tools">
            <div class="chat-nav-pair" aria-label="대화 이동">
              <button class="nav-button" id="prevButton" type="button" aria-label="이전 대화">‹</button>
              <button class="nav-button" id="nextButton" type="button" aria-label="다음 대화">›</button>
            </div>
            <label class="viewer-control">
              <span>보기 기준</span>
              <select id="viewerSpeaker">
                <option value="">단톡방</option>
              </select>
            </label>
            <span class="conversation-index-control" aria-label="대화 번호 이동">
              <input
                id="conversationIndexInput"
                class="conversation-index-input"
                type="text"
                inputmode="numeric"
                pattern="[0-9]*"
                aria-label="대화 번호"
                value="0"
                disabled
              >
              <span class="conversation-index-separator">/</span>
              <span id="conversationIndexTotal" class="conversation-index-total">0</span>
            </span>
          </div>
        </div>
        <div id="chatBody" class="chat-body">
          <div class="empty-state">우측 입력창에 텍스트를 넣고 파싱 버튼을 눌러주세요.</div>
        </div>
      </article>

      <aside class="label-panel">
        <div class="label-panel-header">
          <div class="section-title" style="margin-bottom: 0;">원시 데이터 (Raw Data) 입력</div>
        </div>
        <div class="label-panel-body">
          <section class="panel-section primary-workflow-section">
            <p style="margin: 0 0 10px 0; color: #6f7782; font-size: 12px;">테스트 세트 6번을 비롯해 본문에 URL, 리스트, 시스템 ID가 들어가도 절대 부서지지 않습니다.</p>
            <textarea
              id="rawTextInput"
              class="admin-textarea"
              style="flex: 1; min-height: 250px; resize: vertical;"
              placeholder="여기에 텍스트를 붙여넣어주세요..."
            ></textarea>
          </section>
        </div>
        <footer class="label-panel-footer action-section">
          <button id="parseButton" class="primary-action" type="button">파싱하여 뷰어에 띄우기</button>
        </footer>
      </aside>
    </section>
  </main>

  <script>
    const state = {
      conversations: [],
      index: 0,
      viewerSpeaker: null
    };

    const el = {
      chatBody: document.getElementById("chatBody"),
      topic: document.getElementById("conversationTopic"),
      indexInput: document.getElementById("conversationIndexInput"),
      indexTotal: document.getElementById("conversationIndexTotal"),
      prevButton: document.getElementById("prevButton"),
      nextButton: document.getElementById("nextButton"),
      rawTextInput: document.getElementById("rawTextInput"),
      parseButton: document.getElementById("parseButton"),
      viewerSpeaker: document.getElementById("viewerSpeaker")
    };

    function init() {
      el.parseButton.addEventListener("click", handleParse);
      el.prevButton.addEventListener("click", () => navigate(-1));
      el.nextButton.addEventListener("click", () => navigate(1));
      
      el.viewerSpeaker.addEventListener("change", () => {
        state.viewerSpeaker = el.viewerSpeaker.value || null;
        renderChatMessages();
      });

      el.indexInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          const target = parseInt(e.target.value, 10) - 1;
          goToIndex(target);
        }
      });
      el.indexInput.addEventListener("blur", (e) => {
        const target = parseInt(e.target.value, 10) - 1;
        goToIndex(target);
      });
    }

    function handleParse() {
      const rawText = el.rawTextInput.value;
      if (!rawText.trim()) {
        alert("파싱할 텍스트를 입력해주세요.");
        return;
      }
      state.conversations = parseRawText(rawText);
      state.index = 0;
      state.viewerSpeaker = null;
      renderConversation();
    }

    // ==========================================
    // 본문 ID 보호 및 포맷 믹싱 완벽 지원 파서
    // ==========================================
    function parseRawText(rawText) {
      let text = rawText.replace(/conversation_id\s*dialog_text/gi, '').trim();

      // 1. 구글 시트 다중 셀 복사 포맷 (""로 묶임)
      text = text.replace(/(^|\n)"([\s\S]*?)"(?=\n|$)/g, (match, p1, innerText) => {
          return p1 + innerText.replace(/""/g, '"') + '\n|||BLOCK_END|||\n';
      });

      // 2. 글자 찰싹 붙음(Unglue) 방지
      // (1) 숫자 앞이 문자인 경우 분리
      text = text.replace(/([^\d\s\n])(\d+\.\s+[^:\n]{1,30}:)/g, '$1\n$2');
      
      // (2) [수정됨] ID(ego_)가 다른 글자에 붙었을 때 떼어내되, 
      // 뒤에 '정확한 화자 패턴(나:, 1. 나:)'이 따라오는 "진짜 새로운 대화방"일 때만 떼어냅니다.
      // 본문 속에 쓰인 "ego_..."는 무시하고 보존합니다.
      text = text.replace(/([^\s\n])(ego_\d+-sess-[a-z0-9]+(?=(?:\n|(?:\d+\.\s*)?[가-힣A-Za-z0-9\s]{1,15}:)))/gi, '$1\n$2');

      const parsedConversations = [];
      let currentMessages = [];
      let currentTopic = '';
      let convCounter = 1;

      function saveCurrent() {
          if (currentMessages.length > 0) {
              parsedConversations.push({
                  topic: currentTopic || `대화방 ${convCounter}`,
                  messages: [...currentMessages]
              });
              currentMessages = [];
              currentTopic = '';
              convCounter++;
          }
      }

      function isValidSpeaker(name) {
          const lower = name.toLowerCase();
          return lower !== 'http' && lower !== 'https';
      }

      const chunks = text.split(/(?:\|\|\|BLOCK_END\|\|\||\n\s*\n|---)/);

      chunks.forEach(chunk => {
          const lines = chunk.split('\n');
          let lastNum = 0;
          let isNumberedMode = false;

          lines.forEach(line => {
              const trimmed = line.trim();
              if (!trimmed) return;

              // Ego ID 매칭 로직 보완
              const egoMatch = trimmed.match(/^(ego_\d+-sess-[a-z0-9]+)(.*)$/i);
              if (egoMatch) {
                  const id = egoMatch[1];
                  const remainder = egoMatch[2].trim();
                  
                  let isRoomStart = false;
                  let parsedSpeaker = null;
                  let parsedText = null;

                  // 뒤에 화자가 따라오거나 아예 비어있을 때만 새로운 방으로 인정 (본문 속 ID와 구분)
                  if (remainder === '') {
                      isRoomStart = true;
                  } else {
                      const numMatch = remainder.match(/^(\d+)\.\s+([^:\n]{1,30}):\s*(.*)$/);
                      if (numMatch && isValidSpeaker(numMatch[2].trim())) {
                          isRoomStart = true;
                          parsedSpeaker = numMatch[2].trim();
                          parsedText = numMatch[3].trim();
                          lastNum = parseInt(numMatch[1], 10);
                          isNumberedMode = true;
                      } else {
                          const stdMatch = remainder.match(/^([^:\n]{1,30}):\s*(.*)$/);
                          if (stdMatch && isValidSpeaker(stdMatch[1].trim())) {
                              isRoomStart = true;
                              parsedSpeaker = stdMatch[1].trim();
                              parsedText = stdMatch[2].trim();
                              isNumberedMode = false;
                          }
                      }
                  }

                  // 새로운 방이 맞다면 저장 후 갱신
                  if (isRoomStart) {
                      saveCurrent(); 
                      currentTopic = id;
                      if (parsedSpeaker !== null) {
                          currentMessages.push({ speaker: parsedSpeaker, text: parsedText });
                      }
                      return;
                  }
                  // isRoomStart가 false면 본문 속 ID라는 뜻! 아래 평문 로직으로 자연스럽게 넘어갑니다.
              }

              // "번호. 화자: 내용" 매칭
              const numMatch = trimmed.match(/^(\d+)\.\s+([^:\n]{1,30}):\s*(.*)$/);
              if (numMatch && isValidSpeaker(numMatch[2].trim())) {
                  const num = parseInt(numMatch[1], 10);
                  
                  if (isNumberedMode && num <= lastNum && lastNum !== 0) {
                      saveCurrent();
                  }
                  
                  lastNum = num;
                  isNumberedMode = true;
                  currentMessages.push({ speaker: numMatch[2].trim(), text: numMatch[3].trim() });
                  return;
              }

              // "화자: 내용" (번호 없는 패턴) 매칭
              const stdMatch = trimmed.match(/^([^:\n]{1,30}):\s*(.*)$/);
              if (stdMatch && isValidSpeaker(stdMatch[1].trim())) {
                  currentMessages.push({ speaker: stdMatch[1].trim(), text: stdMatch[2].trim() });
                  return;
              }

              // 어떠한 포맷도 아닐 경우 이어붙임
              if (currentMessages.length > 0) {
                  currentMessages[currentMessages.length - 1].text += '\n' + trimmed;
              } else {
                  currentMessages.push({ speaker: "시스템", text: trimmed });
              }
          });
          
          saveCurrent();
      });

      return parsedConversations;
    }

    function renderConversation() {
      const total = state.conversations.length;
      el.indexTotal.textContent = String(total);
      
      if (total === 0) {
        el.topic.textContent = "대화를 불러오세요";
        el.indexInput.value = "0";
        el.indexInput.disabled = true;
        el.chatBody.innerHTML = '<div class="empty-state">파싱된 대화가 없습니다. 텍스트 포맷을 확인해주세요.</div>';
        el.viewerSpeaker.innerHTML = '<option value="">단톡방</option>';
        return;
      }

      el.indexInput.disabled = false;
      el.indexInput.value = String(state.index + 1);

      const conversation = state.conversations[state.index];
      el.topic.textContent = conversation.topic;
      
      renderViewerOptions(conversation);
      renderChatMessages();
    }

    function renderViewerOptions(conversation) {
      const speakers = [];
      conversation.messages.forEach(msg => {
        if (msg.speaker && msg.speaker !== "시스템" && !speakers.includes(msg.speaker)) {
          speakers.push(msg.speaker);
        }
      });

      const previous = state.viewerSpeaker;
      state.viewerSpeaker = speakers.includes(previous) ? previous : null;

      el.viewerSpeaker.innerHTML = [
        '<option value="">단톡방</option>',
        ...speakers.map(speaker => (
          `<option value="${escapeHtml(speaker)}">${escapeHtml(speaker)} 기준</option>`
        )),
      ].join("");
      
      el.viewerSpeaker.value = state.viewerSpeaker || "";
    }

    function renderChatMessages() {
      const conversation = state.conversations[state.index];
      if (!conversation) return;

      const targetSpeaker = state.viewerSpeaker || "나";
      
      el.chatBody.innerHTML = conversation.messages
        .map(message => {
          if (message.speaker === "시스템") {
            return renderMessage(message, "system");
          }
          const isMine = message.speaker === targetSpeaker;
          return renderMessage(message, isMine ? "right" : "left");
        })
        .join("");
        
      el.chatBody.scrollTop = 0;
    }

    function renderMessage(message, side) {
      const speaker = escapeHtml(message.speaker);
      const text = escapeHtml(message.text);
      
      if (side === "system") {
        return `
          <div class="message-row system">
            <div class="bubble">${text}</div>
          </div>
        `;
      }

      const mine = side === "right";
      const avatar = renderAvatar(message.speaker);

      if (mine) {
        return `
          <div class="message-row me">
            <div class="message-stack">
              <div class="speaker me-speaker">${speaker}</div>
              <div class="bubble">${text}</div>
            </div>
            ${avatar}
          </div>
        `;
      }
      return `
        <div class="message-row">
          ${avatar}
          <div class="message-stack">
            <div class="speaker">${speaker}</div>
            <div class="bubble">${text}</div>
          </div>
        </div>
      `;
    }

    function navigate(direction) {
      const total = state.conversations.length;
      if (total === 0) return;
      let newIndex = state.index + direction;
      
      if (newIndex >= 0 && newIndex < total) {
        state.index = newIndex;
        renderConversation();
      }
    }

    function goToIndex(targetIndex) {
      const total = state.conversations.length;
      if (total === 0 || isNaN(targetIndex)) {
        el.indexInput.value = total > 0 ? state.index + 1 : 0;
        return;
      }
      targetIndex = Math.max(0, Math.min(targetIndex, total - 1));
      if (targetIndex !== state.index) {
        state.index = targetIndex;
        renderConversation();
      } else {
        el.indexInput.value = targetIndex + 1;
      }
    }

    function renderAvatar(speaker) {
      const meta = avatarMetaForSpeaker(speaker);
      return `
        <div
          class="speaker-avatar"
          title="${escapeHtml(speaker)}"
          style="--avatar-bg:${meta.bg};--avatar-ink:${meta.ink};--avatar-ring:${meta.ring};"
        >${escapeHtml(meta.initials)}</div>
      `;
    }

    function avatarMetaForSpeaker(speaker) {
      const palette = [
        ["#4e79a7", "#ffffff", "#315f88"],
        ["#f28e2b", "#1f1408", "#c56d16"],
        ["#59a14f", "#ffffff", "#377d35"],
        ["#e15759", "#ffffff", "#ba3a3d"],
        ["#b07aa1", "#ffffff", "#8f5c80"],
        ["#76b7b2", "#092624", "#4f9692"],
        ["#edc948", "#2c2300", "#c3a126"],
        ["#9c755f", "#ffffff", "#7b5845"],
        ["#5d6b99", "#ffffff", "#424d73"],
      ];
      const key = speaker || "?";
      const idx = hashString(key) % palette.length;
      const [bg, ink, ring] = palette[idx];
      return { bg, ink, ring, initials: speakerInitials(key) };
    }

    function speakerInitials(speaker) {
      const normalized = String(speaker).trim();
      if (!normalized) return "?";
      return Array.from(normalized.replace(/\s+/g, "")).slice(0, 2).join("");
    }

    function hashString(value) {
      let hash = 0;
      for (const char of Array.from(String(value))) {
        hash = (hash * 31 + char.codePointAt(0)) >>> 0;
      }
      return hash;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
